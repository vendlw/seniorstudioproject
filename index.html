<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>channel_01</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:"Courier New",Courier,monospace; }
  #threeCanvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; }
  #bloomCanvas {
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    z-index:1; pointer-events:none;
    mix-blend-mode: screen;
  }
  #tearCanvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:2; pointer-events:none; }
  #glitchOverlay {
    position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:3; pointer-events:none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }
  #ui {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    padding:10px 14px 22px;
    background:linear-gradient(transparent, rgba(0,0,0,0.88) 45%);
  }
  .input-row { display:flex; gap:6px; align-items:center; margin-bottom:5px; }
  .prompt { color:#ffff00; font-size:13px; white-space:nowrap; }
  input[type=text] {
    flex:1; background:transparent; border:none; border-bottom:1px solid #ffff00;
    outline:none; color:#ffff00; font-family:"Courier New",monospace;
    font-size:14px; padding:3px 4px; caret-color:#ffff00;
  }
  input::placeholder { color:#555500; }
  button#submitBtn {
    background:transparent; border:1px solid #ffff00; color:#ffff00;
    font-family:"Courier New",monospace; font-size:13px; padding:3px 10px; cursor:pointer;
  }
  button#submitBtn:active { background:#ffff00; color:#000; }
  .meta { display:flex; justify-content:space-between; font-size:10px; color:#555500; }
  .meta .lw { color:#ffff00; }
  #dev {
    position:fixed; top:0; left:0; z-index:20; padding:6px 8px; display:flex; gap:6px;
    opacity:0.12; transition:opacity 0.2s;
  }
  #dev:hover { opacity:1; }
  #dev button {
    background:transparent; border:1px solid #ffff00; color:#ffff00;
    font-family:"Courier New",monospace; font-size:9px; padding:2px 6px; cursor:pointer;
  }
  #dev button:active { background:#ffff00; color:#000; }
  #feedback {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#ffff00; font-size:13px; font-family:"Courier New",monospace;
    pointer-events:none; opacity:0; transition:opacity 0.08s; z-index:15;
    text-align:center; white-space:nowrap; text-shadow: 0 0 20px #ffff00, 0 0 40px #ffff00;
  }
  #feedback.show { opacity:1; }
  #whiteFlash {
    position:fixed; inset:0; z-index:9; pointer-events:none;
    background:#fff; opacity:0; transition:opacity 0.05s;
  }
</style>
</head>
<body>
<canvas id="threeCanvas"></canvas>
<canvas id="bloomCanvas"></canvas>
<canvas id="tearCanvas"></canvas>
<div id="glitchOverlay"></div>
<div id="whiteFlash"></div>
<div id="feedback"></div>
<div id="dev">
  <button id="resetBtn">reset</button>
  <button id="addTenBtn">+10</button>
  <button id="destroyBtn">destroy</button>
</div>
<div id="ui">
  <div class="input-row">
    <span class="prompt">&gt;</span>
    <input type="text" id="wordInput" placeholder="enter a word" maxlength="40" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
    <button id="submitBtn">ok</button>
  </div>
  <div class="meta">
    <span>ch_01 · words: <span id="wordCount">0</span> · density: <span id="densityPct">0%</span></span>
    <span id="latestWord" class="lw">&nbsp;</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// UTILS
// ============================================================
const NEONS=[
  [255,0,255],[0,255,255],[255,255,0],[0,255,0],
  [255,0,100],[0,100,255],[255,80,0],[180,0,255],
  [0,255,150],[255,0,0],[255,200,0],[100,0,255],
  [0,255,80],[255,50,200],[0,200,255]
];
function randNeon(){return NEONS[Math.floor(Math.random()*NEONS.length)];}
function hashWord(w){
  let h=2166136261;
  for(let i=0;i<w.length;i++){h^=w.charCodeAt(i);h=(h*16777619)>>>0;}
  return h;
}
function seededRNG(seed){
  let s=seed>>>0;
  return ()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;};
}
function valueNoise(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const s=(ix*374761393+iy*1376312589)>>>0;
  const r=seededRNG(s);
  const a=r(),b=r(),c=r(),d=r();
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy;
}
function noise3(x,y,z){
  return valueNoise(x+z*0.3,y)*0.5
       + valueNoise(x*2.1+3.7,y*2.1+z*0.6+1.3)*0.3
       + valueNoise(x*4.3+7.1,y*4.3+z*1.2+5.9)*0.2;
}

// ============================================================
// STATE
// ============================================================
function seedParams(word){
  const h=hashWord(String(word));
  const rng=seededRNG(h);
  const sp=rng(); // spikiness 0-1
  // void color — tinted from word hash
  const voidHue=rng();
  const voidR=voidHue<0.33?Math.floor(rng()*25+5):Math.floor(rng()*8);
  const voidG=voidHue>0.33&&voidHue<0.66?Math.floor(rng()*20+3):Math.floor(rng()*5);
  const voidB=voidHue>0.66?Math.floor(rng()*30+8):Math.floor(rng()*15+5);
  return{
    formCount:   Math.floor(rng()*3+2),
    spikiness:   sp,
    noiseFreq:   sp>0.7 ? rng()*4+2 : rng()*1.5+0.4,   // high spike = high freq
    noiseAmp:    sp>0.7 ? rng()*1.8+0.8 : rng()*0.6+0.2, // high spike = high amp
    lightCol1:   [Math.floor(rng()*NEONS.length),Math.floor(rng()*NEONS.length)],
    lightIntens: rng()*3+1.5,
    rotSpeed:    rng()*0.004+0.001,
    tearCount:   Math.floor(rng()*3+1),
    shiftAmt:    rng()*40+8,
    scanlines:   Math.floor(rng()*8+3),
    bloomIntens: rng()*0.3+0.25,
    baseType:    Math.floor(rng()*5),
    voidColor:   [voidR,voidG,voidB],
    word, hash:h
  };
}

let wordBank=JSON.parse(localStorage.getItem('wb_ch01')||'[]');
let density=parseFloat(localStorage.getItem('dn_ch01')||'0');
let params=seedParams(wordBank.length>0?wordBank[wordBank.length-1]:'init');
let submitFlash=0, frameT=0;
let destructionMode=false, destructionTimer=0;
let submissionsSinceDestruction=0;
const DESTRUCTION_INTERVAL=20;

// morphing state
let morphing=false, morphT=0, morphDuration=45;
let prevPositions=[], targetPositions=[];
let prevScales=[], targetScales=[];

function persist(){
  localStorage.setItem('wb_ch01',JSON.stringify(wordBank));
  localStorage.setItem('dn_ch01',String(density));
}

// ============================================================
// THREE.JS
// ============================================================
const renderer=new THREE.WebGLRenderer({
  canvas:document.getElementById('threeCanvas'),
  antialias:false, alpha:false, preserveDrawingBuffer:true
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000000,1);
renderer.toneMapping=THREE.ReinhardToneMapping;
renderer.toneMappingExposure=2.5;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000005,0.028);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,0,5.5);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  bloomCanvas.width=window.innerWidth; bloomCanvas.height=window.innerHeight;
  tearCanvas.width=window.innerWidth;  tearCanvas.height=window.innerHeight;
});

// ============================================================
// SHADER MATERIAL — scanlines glitch at edges, fade on bright
// ============================================================
function makeMat(col,col2,spikiness,opacity,wireframe){
  const c1=new THREE.Color(col[0]/255*0.18,col[1]/255*0.18,col[2]/255*0.18);
  const e1=new THREE.Color(col2[0]/255*0.55,col2[1]/255*0.55,col2[2]/255*0.55);
  return new THREE.ShaderMaterial({
    uniforms:{
      uColor:    {value:c1},
      uEmissive: {value:e1},
      uEmitInt:  {value:0.7+density*0.9},
      uScanFreq: {value:60+spikiness*160},
      uTime:     {value:0},
      uOpacity:  {value:opacity},
      uSpiky:    {value:spikiness},
    },
    vertexShader:`
      varying vec3 vNormal;
      varying vec4 vClipPos;
      varying float vDepth;
      void main(){
        vNormal=normalize(normalMatrix*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        vClipPos=gl_Position;
        vDepth=gl_Position.z/gl_Position.w;
      }
    `,
    fragmentShader:`
      uniform vec3 uColor;
      uniform vec3 uEmissive;
      uniform float uEmitInt;
      uniform float uScanFreq;
      uniform float uTime;
      uniform float uOpacity;
      uniform float uSpiky;
      varying vec3 vNormal;
      varying vec4 vClipPos;
      varying float vDepth;

      void main(){
        vec2 sc=vClipPos.xy/vClipPos.w;

        // edge detection — how much are we grazing the surface
        float edge=1.0-abs(dot(vNormal,vec3(0,0,1)));
        float edgeFactor=pow(edge,1.5);

        // scanlines — break and glitch at edges
        float scanRaw=sin(sc.y*uScanFreq+uTime*0.4);
        // break scanlines at edges — add noise offset
        float glitchOffset=edgeFactor*sin(sc.y*uScanFreq*3.1+uTime*2.0)*0.3;
        float scan=sin(sc.y*uScanFreq+uTime*0.4+glitchOffset*3.0);
        float scanLine=smoothstep(0.1,0.9,scan);
        float dark=1.0-scanLine*(0.22+uSpiky*0.15);

        // diffuse
        vec3 ld=normalize(vec3(0.4,0.8,1.2));
        float diff=max(dot(vNormal,ld),0.0)*0.7+0.3;

        // bright faces — scanlines fade out
        float brightness=diff;
        float scanFade=1.0-smoothstep(0.6,1.0,brightness)*0.7;
        dark=mix(1.0,dark,scanFade);

        vec3 col=uColor*diff*dark+uEmissive*uEmitInt*dark;

        // chromatic edge aberration
        col.r+=edgeFactor*0.12*sin(sc.y*uScanFreq*0.95+uTime);
        col.b+=edgeFactor*0.10*sin(sc.y*uScanFreq*1.05-uTime);

        // depth fog softening (dof hint)
        float fogFactor=smoothstep(0.3,1.0,vDepth*0.5+0.5);
        col=mix(col,vec3(0.0),fogFactor*0.5);

        gl_FragColor=vec4(col,uOpacity*(1.0-fogFactor*0.4));
      }
    `,
    transparent:true,
    side:THREE.DoubleSide,
    wireframe:wireframe||false,
  });
}

// ============================================================
// GEOMETRY
// ============================================================
function buildGeo(baseType,segments,noiseFreq,noiseAmp,spikiness,seed,destructMult){
  let geo;
  const dm=destructMult||1;
  switch(baseType){
    case 0: geo=new THREE.SphereGeometry(1,segments,segments); break;
    case 1: geo=new THREE.IcosahedronGeometry(1,Math.max(1,Math.floor(segments/5))); break;
    case 2: geo=new THREE.BoxGeometry(1,1,1,Math.floor(segments/3),Math.floor(segments/3),Math.floor(segments/3)); break;
    case 3: geo=new THREE.TorusGeometry(0.7,0.4,Math.floor(segments/2),segments); break;
    case 4: geo=new THREE.ConeGeometry(0.8,1.8,segments,Math.floor(segments/2)); break;
    default: geo=new THREE.SphereGeometry(1,segments,segments);
  }
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const n1=noise3(x*noiseFreq,y*noiseFreq,z*noiseFreq);
    const n2=noise3(x*noiseFreq*2.5+10,y*noiseFreq*2.5+10,z*noiseFreq*2.5)*0.4;
    const n3=noise3(x*noiseFreq*6+30,y*noiseFreq*6+30,z*noiseFreq*6)*0.15;
    const rawN=n1+n2+n3;
    // spikiness varies wildly — sharp exponent for high values
    const spiked=spikiness>0.6
      ? Math.pow(Math.abs(rawN),0.3+spikiness*0.5)*Math.sign(rawN)*1.4
      : rawN;
    const disp=1+spiked*noiseAmp*dm;
    pos.setXYZ(i,x*disp,y*disp,z*disp);
  }
  geo.computeVertexNormals();
  return geo;
}

// ============================================================
// FORMS
// ============================================================
const forms=[];
const formGroup=new THREE.Group();
scene.add(formGroup);
let activeLights=[];

function spawnForm(p,idx,isDestruction){
  const rng=seededRNG(p.hash+idx*9999+(isDestruction?777777:0));
  const sp=isDestruction?rng():p.spikiness;
  const segments=isDestruction?Math.floor(rng()*8+3):Math.floor(rng()*14+8);
  const dm=isDestruction?rng()*4+1:1;
  const geo=buildGeo(
    isDestruction?Math.floor(rng()*5):p.baseType,
    segments,
    p.noiseFreq*(isDestruction?rng()*3+0.5:1),
    p.noiseAmp*(isDestruction?rng()*3+0.5:1),
    sp, p.hash+idx, dm
  );
  const colIdx=p.lightCol1[idx%2];
  const col2Idx=(colIdx+Math.floor(rng()*7)+1)%NEONS.length;
  const col=NEONS[colIdx], col2=NEONS[col2Idx];
  const wireframe=isDestruction?rng()<0.45:sp>0.78&&rng()<0.4;
  const mat=makeMat(col,col2,isDestruction?rng():sp,isDestruction?0.55+rng()*0.45:0.82+rng()*0.18,wireframe);

  const mesh=new THREE.Mesh(geo,mat);
  const spread=isDestruction?3.5+rng()*2.5:Math.max(0.3,1.8-density*0.9);
  mesh.position.set((rng()-0.5)*spread*2.5,(rng()-0.5)*spread*2,(rng()-0.5)*spread*1.8);
  const scale=isDestruction?rng()*2.2+0.2:rng()*0.85+0.45;
  mesh.scale.setScalar(scale);
  mesh.userData={
    rotAxis:new THREE.Vector3(rng()-0.5,rng()-0.5,rng()-0.5).normalize(),
    rotSpeed:(rng()*0.01+0.001)*(1+density*2)*(isDestruction?rng()*6+2:1),
    phase:rng()*1000, wobble:rng()*0.012+0.002,
    baseScale:scale, isDestruction,
    spazVx:isDestruction?(rng()-0.5)*0.12:0,
    spazVy:isDestruction?(rng()-0.5)*0.12:0,
    spazVz:isDestruction?(rng()-0.5)*0.06:0,
    morphSeed:rng()*1000,
    col,col2,sp,segments,
  };
  return mesh;
}

function buildLights(p,isDestruction){
  scene.children.filter(c=>c.isLight).forEach(l=>scene.remove(l));
  const c1=NEONS[p.lightCol1[0]], c2=NEONS[p.lightCol1[1]];
  const im=isDestruction?3.5:1;
  const l1=new THREE.PointLight(new THREE.Color(c1[0]/255,c1[1]/255,c1[2]/255),p.lightIntens*(1+density*1.5)*im,15);
  l1.position.set(0.3,0.5,1.5); scene.add(l1);
  const l2=new THREE.PointLight(new THREE.Color(c2[0]/255,c2[1]/255,c2[2]/255),p.lightIntens*0.6*(1+density)*im,12);
  l2.position.set(-1.2,-0.6,-1); scene.add(l2);
  // WHITE OVEREXPOSED CORE — key to bloom
  const core=new THREE.PointLight(0xffffff,p.lightIntens*1.8*(isDestruction?3:1),4);
  core.position.set(0,0,0.2); scene.add(core);
  // second white core slightly offset
  const core2=new THREE.PointLight(0xffffff,p.lightIntens*0.9*(isDestruction?2:1),3);
  core2.position.set(0.3,-0.2,0.8); scene.add(core2);
  // bruised ambient
  const vc=p.voidColor;
  scene.add(new THREE.AmbientLight(new THREE.Color(vc[0]/255,vc[1]/255,vc[2]/255),0.8));
  return [l1,l2,core,core2];
}

function rebuildForms(p,isDestruction){
  while(formGroup.children.length) formGroup.remove(formGroup.children[0]);
  forms.length=0;
  const count=isDestruction?Math.floor(Math.random()*14+8):p.formCount+Math.floor(density*4);
  for(let i=0;i<count;i++){
    const m=spawnForm(p,i,isDestruction);
    formGroup.add(m); forms.push(m);
  }
  activeLights=buildLights(p,isDestruction);
  // update fog to void color
  const vc=p.voidColor;
  scene.fog.color.setRGB(vc[0]/255*0.5,vc[1]/255*0.5,vc[2]/255*0.5);
  renderer.setClearColor(new THREE.Color(vc[0]/4096,vc[1]/4096,vc[2]/4096),1);
}

rebuildForms(params,false);

// ============================================================
// MORPHING — store positions and lerp toward new targets
// ============================================================
function startMorph(newP){
  // capture current positions/scales
  prevPositions=forms.map(f=>f.position.clone());
  prevScales=forms.map(f=>f.scale.x);
  // build target positions from new params without rebuilding scene yet
  const rng=seededRNG(newP.hash);
  const count=forms.length;
  targetPositions=[];
  targetScales=[];
  for(let i=0;i<count;i++){
    const r=seededRNG(newP.hash+i*9999);
    const spread=Math.max(0.3,1.8-density*0.9);
    targetPositions.push(new THREE.Vector3(
      (r()-0.5)*spread*2.5,(r()-0.5)*spread*2,(r()-0.5)*spread*1.8
    ));
    targetScales.push(r()*0.85+0.45);
  }
  morphing=true; morphT=0;
}

// ============================================================
// BLOOM — multi-pass: blurred copy + radial center glow
// ============================================================
const bloomCanvas=document.getElementById('bloomCanvas');
const bctx=bloomCanvas.getContext('2d');
bloomCanvas.width=window.innerWidth; bloomCanvas.height=window.innerHeight;

function drawBloom(){
  const W=bloomCanvas.width, H=bloomCanvas.height;
  bctx.clearRect(0,0,W,H);

  // pass 1 — wide soft bloom (heavy blur)
  const offscreen=document.createElement('canvas');
  offscreen.width=W; offscreen.height=H;
  const octx=offscreen.getContext('2d');
  octx.drawImage(renderer.domElement,0,0,W,H);

  // draw blurred copy at low opacity — wide halo
  bctx.filter='blur(22px)';
  bctx.globalAlpha=params.bloomIntens*(destructionMode?1.6:0.8);
  bctx.drawImage(offscreen,0,0);

  // pass 2 — tighter bright core bloom
  bctx.filter='blur(8px)';
  bctx.globalAlpha=params.bloomIntens*1.4*(destructionMode?2:1);
  bctx.drawImage(offscreen,0,0);

  // pass 3 — radial white glow at center — overexposed core
  bctx.filter='none';
  const cx=W/2+Math.sin(frameT*0.012)*W*0.05;
  const cy=H/2+Math.cos(frameT*0.009)*H*0.04;
  const grd=bctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.28);
  const bi=params.bloomIntens*(destructionMode?2.5:1.2)*(1+density*0.5);
  grd.addColorStop(0,`rgba(255,255,255,${Math.min(0.9,bi*0.7)})`);
  grd.addColorStop(0.15,`rgba(255,255,255,${Math.min(0.5,bi*0.3)})`);
  grd.addColorStop(0.4,`rgba(255,255,255,${Math.min(0.15,bi*0.08)})`);
  grd.addColorStop(1,'rgba(255,255,255,0)');
  bctx.globalAlpha=1;
  bctx.fillStyle=grd;
  bctx.fillRect(0,0,W,H);

  bctx.filter='none';
  bctx.globalAlpha=1;
}

// ============================================================
// TEAR CANVAS
// ============================================================
const tearCanvas=document.getElementById('tearCanvas');
const tctx=tearCanvas.getContext('2d');
tearCanvas.width=window.innerWidth; tearCanvas.height=window.innerHeight;

function drawTears(){
  const W=tearCanvas.width, H=tearCanvas.height;
  tctx.clearRect(0,0,W,H);
  const strips=Math.floor(density*8+(submitFlash>0?18:0)+params.scanlines*0.5+(destructionMode?25:0));
  for(let i=0;i<strips;i++){
    const rgb=randNeon();
    tctx.globalAlpha=Math.random()*(destructionMode?0.18:0.055)+0.015;
    tctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    tctx.fillRect(0,Math.random()*H,W,Math.random()*3+1);
  }
  tctx.globalAlpha=1;
  const tears=params.tearCount+Math.floor(density*4)+(submitFlash>0?3:0)+(destructionMode?18:0);
  for(let i=0;i<tears;i++){
    tctx.globalAlpha=0.45+Math.random()*0.3;
    tctx.fillStyle='#000';
    tctx.fillRect(0,Math.random()*H,W,Math.random()*(destructionMode?18:5)+1);
  }
  tctx.globalAlpha=1;
  if(submitFlash>14||destructionMode){
    const n=destructionMode?30:16;
    for(let i=0;i<n;i++){
      const rgb=randNeon();
      tctx.globalAlpha=Math.random()*(destructionMode?0.85:0.5);
      tctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      tctx.fillRect(0,Math.random()*H,W,Math.random()*(destructionMode?55:32)+3);
    }
    tctx.globalAlpha=1;
  }
}

// ============================================================
// ANIMATE
// ============================================================
function animateForms(){
  const t=frameT;

  // BREATHING CAMERA
  const breatheX=Math.sin(t*0.007)*0.18+Math.sin(t*0.013)*0.08;
  const breatheY=Math.cos(t*0.009)*0.12+Math.cos(t*0.017)*0.05;
  const breatheZ=5.5+Math.sin(t*0.005)*0.25;
  camera.position.set(breatheX,breatheY,breatheZ);
  camera.lookAt(0,0,0);

  // MORPHING — lerp positions/scales
  if(morphing){
    morphT++;
    const ease=morphT/morphDuration;
    const s=ease<0.5?2*ease*ease:1-Math.pow(-2*ease+2,2)/2; // ease in-out
    for(let i=0;i<Math.min(forms.length,prevPositions.length);i++){
      forms[i].position.lerpVectors(prevPositions[i],targetPositions[i],s);
      const sc=prevScales[i]+(targetScales[i]-prevScales[i])*s;
      forms[i].scale.setScalar(sc);
    }
    if(morphT>=morphDuration){
      morphing=false;
      // now actually rebuild with new geometry
      rebuildForms(params,false);
    }
  }

  for(let i=0;i<forms.length;i++){
    const f=forms[i]; const ud=f.userData;

    if(destructionMode){
      // VERTEX TEARING — rebuild geo with extreme displacement each frame
      if(Math.random()<0.08){
        const newGeo=buildGeo(
          Math.floor(Math.random()*5),
          Math.floor(Math.random()*6+3),
          params.noiseFreq*(Math.random()*5+1),
          params.noiseAmp*(Math.random()*5+1),
          Math.random(), params.hash+i+frameT, Math.random()*6+1
        );
        f.geometry.dispose();
        f.geometry=newGeo;
      }
      // SPAZ movement
      f.position.x+=ud.spazVx*(1.5+Math.sin(t*0.3+i)*1.5);
      f.position.y+=ud.spazVy*(1.5+Math.cos(t*0.25+i)*1.5);
      f.position.z+=ud.spazVz;
      if(Math.abs(f.position.x)>5){ud.spazVx*=-1;}
      if(Math.abs(f.position.y)>5){ud.spazVy*=-1;}
      if(Math.abs(f.position.z)>3){ud.spazVz*=-1;}
      if(Math.random()<0.04){
        f.position.x+=(Math.random()-0.5)*1.8;
        f.position.y+=(Math.random()-0.5)*1.8;
      }
      // CLONING effect — random scale pulses
      f.scale.setScalar(ud.baseScale*(0.3+Math.random()*2.5));
      f.rotateOnAxis(ud.rotAxis,ud.rotSpeed*4);
      if(f.material.uniforms){
        f.material.uniforms.uEmitInt.value=Math.random()*5+0.5;
        f.material.uniforms.uTime.value=t*0.08+Math.random()*3;
        f.material.uniforms.uScanFreq.value=10+Math.random()*300;
      }
    } else {
      if(!morphing){
        f.rotateOnAxis(ud.rotAxis,ud.rotSpeed*(1+density*2));
        ud.phase+=ud.wobble*(1+density*1.5);
        const pulse=1+Math.sin(ud.phase)*0.07*(1+density);
        f.scale.setScalar(ud.baseScale*pulse);
        if(density>0.3&&Math.random()<density*0.07){
          f.position.x+=(Math.random()-0.5)*density*0.1;
          f.position.y+=(Math.random()-0.5)*density*0.1;
        }
      }
      if(f.material.uniforms){
        const flicker=Math.random()<0.04+density*0.08?0.55+Math.random()*0.45:1;
        f.material.uniforms.uEmitInt.value=(0.7+density*0.9)*flicker;
        f.material.uniforms.uTime.value=t*0.018;
      }
    }
  }

  // orbit lights
  if(activeLights.length>0){
    const lt=t*0.01;
    activeLights[0].position.x=Math.sin(lt)*1.8*(destructionMode?2.5:1);
    activeLights[0].position.y=Math.cos(lt*0.7)*1.2*(destructionMode?2.5:1);
    activeLights[0].intensity=params.lightIntens*(1+density*1.5)*(destructionMode?3.5:1)*(0.85+Math.sin(t*0.06)*0.15);
    if(activeLights[1]){
      activeLights[1].position.x=Math.cos(lt*1.3)*1.4;
      activeLights[1].position.y=Math.sin(lt*0.9)*1.0;
    }
    // core flicker — drives bloom
    if(activeLights[2]){
      activeLights[2].intensity=params.lightIntens*1.8*(destructionMode?3:1)*(0.75+Math.random()*0.5+density*0.3);
      activeLights[2].position.x=Math.sin(lt*2.1)*0.4;
      activeLights[2].position.y=Math.cos(lt*1.7)*0.3;
    }
    if(activeLights[3]){
      activeLights[3].intensity=params.lightIntens*0.9*(destructionMode?2:1)*(0.6+Math.random()*0.8);
    }
  }

  formGroup.rotation.y+=params.rotSpeed*(1+density*1.5)*(destructionMode?3:1);
  formGroup.rotation.x+=params.rotSpeed*0.28*(destructionMode?2:1);

  if(destructionMode){
    destructionTimer--;
    if(destructionTimer<=0) endDestruction();
  }
}

// ============================================================
// DESTRUCTION
// ============================================================
function triggerDestruction(){
  destructionMode=true; destructionTimer=200;
  submissionsSinceDestruction=0;
  morphing=false;
  // white flash
  const wf=document.getElementById('whiteFlash');
  wf.style.opacity='0.9';
  setTimeout(()=>wf.style.opacity='0',80);
  rebuildForms(params,true);
}

function endDestruction(){
  destructionMode=false; destructionTimer=0;
  const wf=document.getElementById('whiteFlash');
  wf.style.opacity='0.7';
  setTimeout(()=>wf.style.opacity='0',60);
  rebuildForms(params,false);
}

// ============================================================
// LOOP
// ============================================================
function loop(){
  requestAnimationFrame(loop);
  frameT++;
  submitFlash=Math.max(0,submitFlash-1);
  animateForms();
  renderer.render(scene,camera);
  drawBloom();
  drawTears();
}

// ============================================================
// SUBMIT
// ============================================================
const RAND_WORDS=['void','static','break','lapse','decay','ghost','hollow','surge','bleed','crash','rift','pulse','scar','echo','drift','noise','tear','sink','raw','burn','wraith','collapse','signal','error','null','fracture','abject','rupture','flare','hollow'];

function addWord(word){
  wordBank.push(word);
  density=Math.min(1,density+0.022);
  const newParams=seedParams(word);
  newParams.shiftAmt=newParams.shiftAmt*(1+density*1.4);
  submissionsSinceDestruction++;
  submitFlash=26;

  if(!destructionMode){
    if(submissionsSinceDestruction>=DESTRUCTION_INTERVAL&&Math.random()<0.7){
      params=newParams;
      triggerDestruction();
    } else {
      // start morph to new state
      startMorph(newParams);
      params=newParams;
      // update lights + fog immediately
      buildLights(params,false);
      const vc=params.voidColor;
      scene.fog.color.setRGB(vc[0]/255*0.5,vc[1]/255*0.5,vc[2]/255*0.5);
      renderer.setClearColor(new THREE.Color(vc[0]/4096,vc[1]/4096,vc[2]/4096),1);
    }
  } else {
    params=newParams;
    rebuildForms(params,true);
    destructionTimer=Math.max(destructionTimer,140);
  }

  persist();
  updateUI(word);
}

function updateUI(lastWord){
  document.getElementById('wordCount').textContent=wordBank.length;
  document.getElementById('densityPct').textContent=Math.round(density*100)+'%';
  if(lastWord){
    document.getElementById('latestWord').textContent='"'+lastWord+'"';
    const fb=document.getElementById('feedback');
    fb.textContent='"'+lastWord+'"';
    fb.classList.add('show');
    setTimeout(()=>fb.classList.remove('show'),900);
  }
}

document.getElementById('submitBtn').addEventListener('click',()=>{
  const inp=document.getElementById('wordInput');
  const w=inp.value.trim().toLowerCase();
  if(!w)return; inp.value=''; addWord(w);
});
document.getElementById('wordInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('submitBtn').click();
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('reset?'))return;
  localStorage.removeItem('wb_ch01'); localStorage.removeItem('dn_ch01');
  location.reload();
});
document.getElementById('addTenBtn').addEventListener('click',()=>{
  for(let i=0;i<10;i++) addWord(RAND_WORDS[Math.floor(Math.random()*RAND_WORDS.length)]);
});
document.getElementById('destroyBtn').addEventListener('click',triggerDestruction);

updateUI(null);
loop();
</script>
