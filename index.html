<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>channel_01</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:"Courier New",Courier,monospace; }
  #threeCanvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; }
  #bloomCanvas {
    position:fixed; top:0; left:0; width:100vw; height:100vh;

    mix-blend-mode: screen;
  }
  #tearCanvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:2; pointer-events:none; }
  #glitchOverlay {
    position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:3; pointer-events:none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }
  #vignette {
    position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:4; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.25) 70%, rgba(0,0,0,0.65) 100%);
  }
  #ui {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    padding:10px 14px 22px;
    background:linear-gradient(transparent, rgba(0,0,0,0.92) 45%);
  }
  .input-row { display:flex; gap:6px; align-items:center; margin-bottom:5px; }
  .prompt { color:#fff; font-size:13px; white-space:nowrap; }
  input[type=text] {
    flex:1; background:transparent; border:none;
    border-bottom:1px solid rgba(255,255,255,0.5);

  }
  input::placeholder { color:rgba(255,255,255,0.25); }
  button#submitBtn {
    background:transparent; border:1px solid rgba(255,255,255,0.5); color:#fff;
    font-family:"Courier New",monospace; font-size:13px; padding:3px 10px; cursor:pointer;
  }
  button#submitBtn:active { background:#fff; color:#000; }
  .meta { display:flex; justify-content:space-between; font-size:10px; color:rgba(255,255,255,0.3); }
  .meta .lw { color:rgba(255,255,255,0.65); }
  #dev {
    position:fixed; top:0; left:0; z-index:20; padding:6px 8px; display:flex; gap:6px;
    opacity:0.12; transition:opacity 0.2s;
  }
  #dev:hover { opacity:1; }
  #dev button {
    background:transparent; border:1px solid rgba(255,255,255,0.4); color:#fff;
    font-family:"Courier New",monospace; font-size:9px; padding:2px 6px; cursor:pointer;
  }
  #dev button:active { background:#fff; color:#000; }
  #feedback {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#fff; font-size:13px; font-family:"Courier New",monospace;
    pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:15;

  #feedback.show { opacity:0.8; }

  }

</head>
<body>
<canvas id="threeCanvas"></canvas>
<canvas id="bloomCanvas"></canvas>
<canvas id="tearCanvas"></canvas>
<div id="glitchOverlay"></div>
<div id="vignette"></div>
<div id="whiteFlash"></div>
<div id="feedback"></div>
<div id="dev">
  <button id="resetBtn">reset</button>
  <button id="addTenBtn">+10</button>
  <button id="destroyBtn">destroy</button>
</div>
<div id="ui">
  <div class="input-row">
    <span class="prompt">&gt;</span>
    <input type="text" id="wordInput" placeholder="enter a word" maxlength="40" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
    <button id="submitBtn">ok</button>
  </div>
  <div class="meta">
    <span>ch_01 · words: <span id="wordCount">0</span> · density: <span id="densityPct">0%</span></span>
    <span id="latestWord" class="lw">&nbsp;</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// PALETTE
// ============================================================
const PALETTE=[
  [220,30,40],[180,0,80],[90,20,180],[30,200,50],[160,10,10],
  [120,40,200],[200,120,15],[0,200,140],[255,40,90],[140,20,10],
  [200,0,160],[0,160,80],[220,80,10],[140,0,90],[180,180,0],
];
const ACCENT_NEONS=[[255,40,30],[255,0,180],[0,255,100],[255,255,0],[0,200,255]];
function randPalette(){ return PALETTE[Math.floor(Math.random()*PALETTE.length)]; }
function randAccent(){ return ACCENT_NEONS[Math.floor(Math.random()*ACCENT_NEONS.length)]; }

// ============================================================
// TEXTURES — load from /textures/ folder
// ============================================================
const TEXTURE_COUNT=100;
const texLoader=new THREE.TextureLoader();
const texPool=[];
let texReady=0;
for(let i=0;i<TEXTURE_COUNT;i++){
  const idx=String(i).padStart(3,'0');
  const t=texLoader.load(`textures/tex_${idx}.jpg`,()=>texReady++,undefined,()=>texReady++);
  t.wrapS=THREE.RepeatWrapping; t.wrapT=THREE.RepeatWrapping;
  texPool.push(t);
}
function randTex(){ return texPool[Math.floor(Math.random()*texPool.length)]; }

// ============================================================
// UTILS
// ============================================================
function hashWord(w){
  let h=2166136261;
  for(let i=0;i<w.length;i++){h^=w.charCodeAt(i);h=(h*16777619)>>>0;}
  return h;
}
function seededRNG(seed){
  let s=seed>>>0;
  return ()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;};
}
function valueNoise(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const s=(ix*374761393+iy*1376312589)>>>0;
  const r=seededRNG(s);
  const a=r(),b=r(),c=r(),d=r();
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy;
}
function noise3(x,y,z){
  return valueNoise(x+z*0.3,y)*0.5
       + valueNoise(x*2.1+3.7,y*2.1+z*0.6+1.3)*0.3
       + valueNoise(x*4.3+7.1,y*4.3+z*1.2+5.9)*0.2;
}
function uncannyEase(t){
  if(t<0.7) return t*t*t*0.3;
  return 0.3*0.343+(t-0.7)/0.3*(1-0.3*0.343);
}
function laboredBreath(t){
  const phase=t%1;
  if(phase<0.4) return Math.pow(phase/0.4,0.6);
  if(phase<0.45) return 1.0;
  return 1.0-Math.pow((phase-0.45)/0.55,0.4);
}

// ============================================================
// STATE
// ============================================================
function seedParams(word){
  const h=hashWord(String(word));
  const rng=seededRNG(h);
  const sp=rng();
  const voidHue=rng();
  const voidR=voidHue<0.33?Math.floor(rng()*12+2):Math.floor(rng()*4);
  const voidG=voidHue>0.33&&voidHue<0.66?Math.floor(rng()*8+1):Math.floor(rng()*3);
  const voidB=voidHue>0.66?Math.floor(rng()*15+3):Math.floor(rng()*6+2);
  // texture chance — seeded so same word always makes same choice
  const useTex=rng()<0.35;
  const texIdx=Math.floor(rng()*TEXTURE_COUNT);
  const texBlend=rng()*0.55+0.3;
  return{
    formCount:   Math.floor(rng()*2+1),
    spikiness:   sp,
    noiseFreq:   sp>0.7?rng()*3+1.5:rng()*1.2+0.3,
    noiseAmp:    sp>0.7?rng()*1.5+0.6:rng()*0.5+0.15,
    lightCol1:   [Math.floor(rng()*PALETTE.length),Math.floor(rng()*PALETTE.length)],
    lightIntens: rng()*2.5+1.5,
    rotSpeed:    rng()*0.0015+0.0003,
    tearCount:   Math.floor(rng()*2+1),
    shiftAmt:    rng()*20+4,
    scanlines:   Math.floor(rng()*4+2),
    bloomIntens: rng()*0.3+0.3,
    baseType:    Math.floor(rng()*5),
    voidColor:   [voidR,voidG,voidB],
    useTex, texIdx, texBlend,
    word, hash:h
  };
}

let wordBank=JSON.parse(localStorage.getItem('wb_ch01')||'[]');
let density=parseFloat(localStorage.getItem('dn_ch01')||'0');
let params=seedParams(wordBank.length>0?wordBank[wordBank.length-1]:'init');
let submitFlash=0, frameT=0;
let destructionMode=false, destructionTimer=0;
let submissionsSinceDestruction=0;
const DESTRUCTION_INTERVAL=20;
let violenceCooldown=0, violenceActive=false, violenceTimer=0;
function escalation(){ return 1+wordBank.length*0.025; }
function jitterAmt(){ return 0.002+wordBank.length*0.0004; }
function spikeProbability(){ return 0.0001+wordBank.length*0.00004; }
let morphing=false, morphT=0, morphDuration=90;
let prevPositions=[], targetPositions=[], prevScales=[], targetScales=[];
function persist(){
  localStorage.setItem('wb_ch01',JSON.stringify(wordBank));
  localStorage.setItem('dn_ch01',String(density));
}

// ============================================================
// THREE.JS
// ============================================================
const renderer=new THREE.WebGLRenderer({
  canvas:document.getElementById('threeCanvas'),
  antialias:false,alpha:false,preserveDrawingBuffer:true
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000000,1);
renderer.toneMapping=THREE.ReinhardToneMapping;
renderer.toneMappingExposure=3.2;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000003,0.018);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,0,5.5);
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  const bc=document.getElementById('bloomCanvas');
  const tc=document.getElementById('tearCanvas');
  if(bc){bc.width=window.innerWidth;bc.height=window.innerHeight;}
  if(tc){tc.width=window.innerWidth;tc.height=window.innerHeight;}
});

// ============================================================
// SHADER — standard scanline mat
// ============================================================
function makeMat(col,col2,spikiness,opacity,wireframe){
  const c1=new THREE.Color(col[0]/255*0.5,col[1]/255*0.5,col[2]/255*0.5);
  const e1=new THREE.Color(col2[0]/255*1.2,col2[1]/255*1.2,col2[2]/255*1.2);
  return new THREE.ShaderMaterial({
    uniforms:{
      uColor:{value:c1},uEmissive:{value:e1},
      uEmitInt:{value:0.6+density*0.7},uScanFreq:{value:40+spikiness*80},
      uTime:{value:0},uOpacity:{value:opacity},uSpiky:{value:spikiness},uDread:{value:0},
    },
    vertexShader:`
      varying vec3 vNormal; varying vec4 vClipPos; varying float vDepth;
      void main(){
        vNormal=normalize(normalMatrix*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        vClipPos=gl_Position; vDepth=gl_Position.z/gl_Position.w;
      }`,
    fragmentShader:`
      uniform vec3 uColor,uEmissive; uniform float uEmitInt,uScanFreq,uTime,uOpacity,uSpiky,uDread;
      varying vec3 vNormal; varying vec4 vClipPos; varying float vDepth;
      void main(){
        vec2 sc=vClipPos.xy/vClipPos.w;
        float edge=1.0-abs(dot(vNormal,vec3(0,0,1)));
        float edgeFactor=pow(edge,2.0);
        float glitchOffset=edgeFactor*sin(sc.y*uScanFreq*2.0+uTime*0.8)*0.2;
        float scan=sin(sc.y*uScanFreq+uTime*0.15+glitchOffset*2.0);
        float scanLine=smoothstep(0.2,0.8,scan);
        vec3 ld=normalize(vec3(0.3,0.6,1.0));
        float diff=max(dot(vNormal,ld),0.0)*0.6+0.25;
        float scanFade=1.0-smoothstep(0.5,0.9,diff)*0.6;
        float dark=mix(1.0,1.0-scanLine*(0.3+uSpiky*0.12),scanFade);
        vec3 col=uColor*diff*dark+uEmissive*uEmitInt*dark;
        float sss=pow(max(0.0,dot(vNormal,-ld)),3.0)*0.15;
        col+=uEmissive*sss*uEmitInt;
        col.r+=edgeFactor*0.06*sin(sc.y*uScanFreq*0.9+uTime*0.5);
        col.b+=edgeFactor*0.04*sin(sc.y*uScanFreq*1.1-uTime*0.3);
        col*=1.0-uDread*0.2; col.r+=uDread*0.05;
        float fogFactor=smoothstep(0.4,1.0,vDepth*0.5+0.5);
        col=mix(col,vec3(0.0),fogFactor*0.35);
        gl_FragColor=vec4(col,uOpacity*(1.0-fogFactor*0.2));
      }`,
    transparent:true,side:THREE.DoubleSide,wireframe:wireframe||false,
  });
}

// ============================================================
// TEXTURE SHADER — your artwork mapped on surface, scanlines on top
// ============================================================
function makeTexMat(tex,col,spikiness,opacity,texBlend){
  const e1=new THREE.Color(col[0]/255*0.8,col[1]/255*0.8,col[2]/255*0.8);
  return new THREE.ShaderMaterial({
    uniforms:{
      uTex:{value:tex},uEmissive:{value:e1},
      uEmitInt:{value:0.35},uScanFreq:{value:35+spikiness*90},
      uTime:{value:0},uOpacity:{value:opacity},uBlend:{value:texBlend},uDread:{value:0},
    },
    vertexShader:`
      varying vec3 vNormal; varying vec4 vClipPos; varying vec2 vUv; varying float vDepth;
      void main(){
        vNormal=normalize(normalMatrix*normal); vUv=uv;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        vClipPos=gl_Position; vDepth=gl_Position.z/gl_Position.w;
      }`,
    fragmentShader:`
      uniform sampler2D uTex; uniform vec3 uEmissive;
      uniform float uEmitInt,uScanFreq,uTime,uOpacity,uBlend,uDread;
      varying vec3 vNormal; varying vec4 vClipPos; varying vec2 vUv; varying float vDepth;
      void main(){
        vec2 sc=vClipPos.xy/vClipPos.w;
        float edge=1.0-abs(dot(vNormal,vec3(0,0,1)));
        float edgeFactor=pow(edge,2.0);
        // sample texture — stretches with displaced geo
        vec4 texCol=texture2D(uTex,vUv);
        // scanlines over texture
        float glitchOff=edgeFactor*sin(sc.y*uScanFreq*2.5+uTime*1.2)*0.25;
        float scan=sin(sc.y*uScanFreq+uTime*0.2+glitchOff*2.5);
        float scanLine=smoothstep(0.15,0.85,scan);
        vec3 ld=normalize(vec3(0.3,0.6,1.0));
        float diff=max(dot(vNormal,ld),0.0)*0.55+0.35;
        float scanFade=1.0-smoothstep(0.5,0.9,diff)*0.55;
        float dark=mix(1.0,1.0-scanLine*0.3,scanFade);
        // blend: texture * blend amount, emissive fills the rest
        vec3 col=mix(uEmissive*uEmitInt, texCol.rgb, uBlend)*diff*dark;
        // chromatic tear at edges — rips the image
        col.r+=edgeFactor*0.09*sin(sc.y*uScanFreq*0.92+uTime*0.6);
        col.b+=edgeFactor*0.08*sin(sc.y*uScanFreq*1.08-uTime*0.4);
        col*=1.0-uDread*0.25; col.r+=uDread*0.04;
        float fogFactor=smoothstep(0.4,1.0,vDepth*0.5+0.5);
        col=mix(col,vec3(0.0),fogFactor*0.35);
        gl_FragColor=vec4(col,uOpacity*(1.0-fogFactor*0.2));
      }`,
    transparent:true,side:THREE.DoubleSide,
  });
}

// ============================================================
// GEOMETRY
// ============================================================
function buildGeo(baseType,segments,noiseFreq,noiseAmp,spikiness,seed,destructMult){
  let geo;
  const dm=destructMult||1;
  switch(baseType){
    case 0:geo=new THREE.SphereGeometry(1,segments,segments);break;
    case 1:geo=new THREE.IcosahedronGeometry(1,Math.max(1,Math.floor(segments/5)));break;
    case 2:geo=new THREE.BoxGeometry(1,1,1,Math.floor(segments/3),Math.floor(segments/3),Math.floor(segments/3));break;
    case 3:geo=new THREE.TorusGeometry(0.7,0.4,Math.floor(segments/2),segments);break;
    case 4:geo=new THREE.ConeGeometry(0.8,1.8,segments,Math.floor(segments/2));break;
    default:geo=new THREE.SphereGeometry(1,segments,segments);
  }
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const n1=noise3(x*noiseFreq,y*noiseFreq,z*noiseFreq);
    const n2=noise3(x*noiseFreq*2.5+10,y*noiseFreq*2.5+10,z*noiseFreq*2.5)*0.4;
    const n3=noise3(x*noiseFreq*6+30,y*noiseFreq*6+30,z*noiseFreq*6)*0.15;
    const rawN=n1+n2+n3;
    const spiked=spikiness>0.6?Math.pow(Math.abs(rawN),0.3+spikiness*0.5)*Math.sign(rawN)*1.4:rawN;
    const disp=1+spiked*noiseAmp*dm;
    pos.setXYZ(i,x*disp,y*disp,z*disp);
  }
  geo.computeVertexNormals();
  return geo;
}

// ============================================================
// FORMS
// ============================================================
const forms=[], formGroup=new THREE.Group();
scene.add(formGroup);
let activeLights=[];

function spawnForm(p,idx,isDestruction){
  const rng=seededRNG(p.hash+idx*9999+(isDestruction?777777:0));
  const sp=isDestruction?rng():p.spikiness;
  const segments=isDestruction?Math.floor(rng()*8+3):Math.floor(rng()*14+8);
  const dm=isDestruction?rng()*4+1:1;
  const geo=buildGeo(
    isDestruction?Math.floor(rng()*5):p.baseType,
    segments,
    p.noiseFreq*(isDestruction?rng()*3+0.5:1),
    p.noiseAmp*(isDestruction?rng()*3+0.5:1),
    sp,p.hash+idx,dm
  );
  const colIdx=p.lightCol1[idx%2];
  const col2Idx=(colIdx+Math.floor(rng()*7)+1)%PALETTE.length;
  const col=PALETTE[colIdx],col2=PALETTE[col2Idx];
  const wireframe=isDestruction?rng()<0.35:sp>0.8&&rng()<0.3;

  // TEXTURE DECISION — seeded from word, ~1 in 3 forms gets artwork texture
  let mat;
  const shouldTex = !wireframe && (isDestruction ? rng()<0.4 : p.useTex && rng()<0.6);
  if(shouldTex && texPool.length>0){
    const t=texPool[p.texIdx%texPool.length];
    mat=makeTexMat(t,col,isDestruction?rng():sp,
      isDestruction?0.45+rng()*0.45:0.75+rng()*0.25,
      p.texBlend);
  } else {
    mat=makeMat(col,col2,isDestruction?rng():sp,
      isDestruction?0.45+rng()*0.45:0.75+rng()*0.25,wireframe);
  }

  const mesh=new THREE.Mesh(geo,mat);
  const spread=isDestruction?3.5+rng()*2.5:Math.max(0.8,2.5-density*0.6);
  mesh.position.set((rng()-0.5)*spread*2.2,(rng()-0.5)*spread*1.8,(rng()-0.5)*spread*1.5);
  const scale=isDestruction?rng()*2.2+0.2:rng()*1.0+0.5;
  mesh.scale.setScalar(scale);
  mesh.userData={
    rotAxis:new THREE.Vector3(rng()-0.5,rng()-0.5,rng()-0.5).normalize(),
    rotSpeed:(rng()*0.004+0.0005)*(1+density)*(isDestruction?rng()*4+1.5:1),
    phase:rng()*1000,wobble:rng()*0.005+0.001,
    baseScale:scale,isDestruction,
    spazVx:isDestruction?(rng()-0.5)*0.06:0,
    spazVy:isDestruction?(rng()-0.5)*0.06:0,
    spazVz:isDestruction?(rng()-0.5)*0.03:0,
    col,col2,sp,segments,
    baseType:isDestruction?Math.floor(rng()*5):p.baseType,
    stillTimer:0,stillDuration:0,isStill:false,
    lurchCooldown:Math.floor(rng()*300+100),
    hasTex:shouldTex,
  };
  return mesh;
}

function buildLights(p,isDestruction){
  scene.children.filter(c=>c.isLight).forEach(l=>scene.remove(l));
  const c1=PALETTE[p.lightCol1[0]],c2=PALETTE[p.lightCol1[1]];
  const im=isDestruction?2.5:1;
  const l1=new THREE.PointLight(new THREE.Color(c1[0]/255,c1[1]/255,c1[2]/255),p.lightIntens*(1+density*1.5)*im,15);
  l1.position.set(0.3,0.5,1.5);scene.add(l1);
  const l2=new THREE.PointLight(new THREE.Color(c2[0]/255,c2[1]/255,c2[2]/255),p.lightIntens*0.9*(1+density)*im,12);
  l2.position.set(-1.2,-0.6,-1);scene.add(l2);
  const core=new THREE.PointLight(0xffffff,p.lightIntens*2.0*(isDestruction?2.5:1),5);
  core.position.set(0,0,0.2);scene.add(core);
  const core2=new THREE.PointLight(0xffffff,p.lightIntens*1.0*(isDestruction?2:1),4);
  core2.position.set(0.3,-0.2,0.8);scene.add(core2);
  const vc=p.voidColor;
  scene.add(new THREE.AmbientLight(new THREE.Color(vc[0]/255,vc[1]/255,vc[2]/255),0.8));
  return [l1,l2,core,core2];
}

function rebuildForms(p,isDestruction){
  while(formGroup.children.length) formGroup.remove(formGroup.children[0]);
  forms.length=0;
  const count=isDestruction?Math.floor(Math.random()*10+5):p.formCount+Math.floor(density*2);
  for(let i=0;i<count;i++){const m=spawnForm(p,i,isDestruction);formGroup.add(m);forms.push(m);}
  activeLights=buildLights(p,isDestruction);
  const vc=p.voidColor;
  scene.fog.color.setRGB(vc[0]/255*0.3,vc[1]/255*0.3,vc[2]/255*0.3);
  renderer.setClearColor(new THREE.Color(vc[0]/6000,vc[1]/6000,vc[2]/6000),1);
}
rebuildForms(params,false);

// ============================================================
// MORPHING
// ============================================================
function startMorph(newP){
  prevPositions=forms.map(f=>f.position.clone());
  prevScales=forms.map(f=>f.scale.x);
  targetPositions=[];targetScales=[];
  for(let i=0;i<forms.length;i++){
    const r=seededRNG(newP.hash+i*9999);
    const spread=Math.max(0.8,2.5-density*0.6);
    targetPositions.push(new THREE.Vector3((r()-0.5)*spread*2.2,(r()-0.5)*spread*1.8,(r()-0.5)*spread*1.5));
    targetScales.push(r()*1.0+0.5);
  }
  morphing=true;morphT=0;
}

// ============================================================
// BLOOM
// ============================================================
const bloomCanvas=document.getElementById('bloomCanvas');
const bctx=bloomCanvas.getContext('2d');
bloomCanvas.width=window.innerWidth;bloomCanvas.height=window.innerHeight;
function drawBloom(){
  const W=bloomCanvas.width,H=bloomCanvas.height;
  bctx.clearRect(0,0,W,H);
  const off=document.createElement('canvas');
  off.width=W;off.height=H;
  off.getContext('2d').drawImage(renderer.domElement,0,0,W,H);
  bctx.filter='blur(28px)';bctx.globalAlpha=params.bloomIntens*(destructionMode?1.5:0.75);bctx.drawImage(off,0,0);
  bctx.filter='blur(10px)';bctx.globalAlpha=params.bloomIntens*1.2*(destructionMode?1.8:1);bctx.drawImage(off,0,0);
  bctx.filter='none';
  const cx=W/2+Math.sin(frameT*0.004)*W*0.03;
  const cy=H/2+Math.cos(frameT*0.003)*H*0.02;
  const grd0=bctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.15);
  const bi=params.bloomIntens*(destructionMode?2.2:1.0)*(1+density*0.4);
  grd0.addColorStop(0,`rgba(255,255,255,${Math.min(0.6,bi*0.5)})`);
  grd0.addColorStop(0.3,`rgba(255,255,255,${Math.min(0.15,bi*0.12)})`);
  grd0.addColorStop(1,'rgba(255,255,255,0)');
  bctx.globalAlpha=1;bctx.fillStyle=grd0;bctx.fillRect(0,0,W,H);
  const gc=PALETTE[params.lightCol1[0]];
  const grd=bctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.35);
  grd.addColorStop(0,`rgba(${Math.min(255,gc[0]*2)},${Math.min(255,gc[1]*2)},${Math.min(255,gc[2]*2)},${Math.min(0.5,bi*0.45)})`);
  grd.addColorStop(0.25,`rgba(${gc[0]},${gc[1]},${gc[2]},${Math.min(0.2,bi*0.18)})`);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  bctx.fillStyle=grd;bctx.fillRect(0,0,W,H);
  bctx.filter='none';bctx.globalAlpha=1;
}

// ============================================================
// TEAR CANVAS
// ============================================================
const tearCanvas=document.getElementById('tearCanvas');
const tctx=tearCanvas.getContext('2d');
tearCanvas.width=window.innerWidth;tearCanvas.height=window.innerHeight;
function drawTears(){
  const W=tearCanvas.width,H=tearCanvas.height;
  tctx.clearRect(0,0,W,H);
  const wEsc=1+wordBank.length*0.03;
  const shouldTear=Math.random()<(0.15+density*0.3+(submitFlash>0?0.8:0)+(destructionMode?0.9:0)+(violenceActive?0.6:0));
  if(!shouldTear&&!destructionMode)return;
  const strips=Math.floor((density*3+(submitFlash>0?8:0)+params.scanlines*0.3+(destructionMode?15:0)+(violenceActive?10:0))*wEsc);
  for(let i=0;i<strips;i++){
    const rgb=violenceActive||destructionMode?randAccent():randPalette();
    tctx.globalAlpha=Math.random()*(destructionMode?0.12:0.035)+0.008;
    tctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    tctx.fillRect(0,Math.random()*H,W,Math.random()*2+1);
  }
  tctx.globalAlpha=1;
  const tears=params.tearCount+Math.floor(density*2)+(submitFlash>0?2:0)+(destructionMode?12:0);
  for(let i=0;i<tears;i++){
    tctx.globalAlpha=0.5+Math.random()*0.3;tctx.fillStyle='#000';
    tctx.fillRect(0,Math.random()*H,W,Math.random()*(destructionMode?14:3)+1);
  }
  tctx.globalAlpha=1;
  if(violenceActive||destructionMode){
    const n=destructionMode?20:8;
    for(let i=0;i<n;i++){
      const rgb=randAccent();
      tctx.globalAlpha=Math.random()*(destructionMode?0.6:0.35);
      tctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      tctx.fillRect(0,Math.random()*H,W,Math.random()*(destructionMode?40:20)+2);
    }
    tctx.globalAlpha=1;
  }
}

// ============================================================
// VIOLENCE
// ============================================================
function tickViolence(){
  violenceCooldown--;
  if(violenceCooldown<=0&&!violenceActive&&!destructionMode){
    if(Math.random()<(0.002+wordBank.length*0.0003)){
      violenceActive=true;
      violenceTimer=Math.floor(Math.random()*15+5);
      violenceCooldown=Math.floor(Math.random()*200+150);
    }
  }
  if(violenceActive){violenceTimer--;if(violenceTimer<=0){violenceActive=false;violenceCooldown=Math.floor(Math.random()*200+150);}}
}

// ============================================================
// ANIMATE
// ============================================================
function animateForms(){
  const t=frameT;
  tickViolence();
  const esc=escalation();
  const breathPhase=laboredBreath((t*0.0015)%1);
  const breathScale=Math.min(esc*0.2,1.2);
  let breatheX=Math.sin(t*0.003)*0.08*breathScale;
  let breatheY=Math.cos(t*0.004)*0.06*breathScale;
  let breatheZ=5.2+breathPhase*0.15*breathScale;
  const driftPhase=Math.sin(t*0.0008)*0.5+0.5;
  breatheZ-=driftPhase*0.4*(1+density*0.5);
  if(violenceActive){breatheX+=(Math.random()-0.5)*0.3;breatheY+=(Math.random()-0.5)*0.2;breatheZ-=0.3;}
  camera.position.set(breatheX,breatheY,breatheZ);
  camera.lookAt(0,0,0);

  if(morphing){
    morphT++;
    const s=uncannyEase(morphT/morphDuration);
    for(let i=0;i<Math.min(forms.length,prevPositions.length);i++){
      forms[i].position.lerpVectors(prevPositions[i],targetPositions[i],s);
      forms[i].scale.setScalar(prevScales[i]+(targetScales[i]-prevScales[i])*s);
    }
    if(morphT>=morphDuration){morphing=false;rebuildForms(params,false);}
  }

  for(let i=0;i<forms.length;i++){
    const f=forms[i];const ud=f.userData;
    if(destructionMode){
      if(Math.random()<0.04){
        const ng=buildGeo(Math.floor(Math.random()*5),Math.floor(Math.random()*6+3),
          params.noiseFreq*(Math.random()*4+1),params.noiseAmp*(Math.random()*4+1),
          Math.random(),params.hash+i+frameT,Math.random()*5+1);
        f.geometry.dispose();f.geometry=ng;
      }
      f.position.x+=ud.spazVx*(0.8+Math.sin(t*0.15+i)*0.8);
      f.position.y+=ud.spazVy*(0.8+Math.cos(t*0.12+i)*0.8);
      f.position.z+=ud.spazVz*0.5;
      if(Math.abs(f.position.x)>4)ud.spazVx*=-1;
      if(Math.abs(f.position.y)>4)ud.spazVy*=-1;
      if(Math.abs(f.position.z)>3)ud.spazVz*=-1;
      if(Math.random()<0.02){f.position.x+=(Math.random()-0.5)*1.2;f.position.y+=(Math.random()-0.5)*1.2;}
      f.scale.setScalar(ud.baseScale*(0.4+Math.random()*1.8));
      f.rotateOnAxis(ud.rotAxis,ud.rotSpeed*2);
      if(f.material.uniforms){
        f.material.uniforms.uEmitInt.value=Math.random()*3+0.3;
        f.material.uniforms.uTime.value=t*0.04+Math.random()*2;
        f.material.uniforms.uScanFreq.value=10+Math.random()*200;
        f.material.uniforms.uDread.value=0.6+Math.random()*0.4;
      }
    } else {
      if(!morphing){
        ud.lurchCooldown--;
        if(!ud.isStill&&ud.lurchCooldown<=0&&Math.random()<0.01){
          ud.isStill=true;ud.stillDuration=Math.floor(Math.random()*120+40);ud.stillTimer=0;
        }
        if(ud.isStill){
          ud.stillTimer++;
          if(ud.stillTimer>=ud.stillDuration){
            ud.isStill=false;ud.lurchCooldown=Math.floor(Math.random()*300+100);
            f.position.x+=(Math.random()-0.5)*0.15*esc;
            f.position.y+=(Math.random()-0.5)*0.12*esc;
          }
          f.position.x+=(Math.random()-0.5)*0.0003;
          f.position.y+=(Math.random()-0.5)*0.0003;
        } else {
          f.rotateOnAxis(ud.rotAxis,ud.rotSpeed*(1+density)*esc*0.3);
          ud.phase+=ud.wobble*(1+density*0.8);
          f.scale.setScalar(ud.baseScale*(1+Math.sin(ud.phase)*0.04*(1+density*0.5)));
          const jit=jitterAmt();
          f.position.x+=(Math.random()-0.5)*jit;
          f.position.y+=(Math.random()-0.5)*jit;
          f.position.z+=(Math.random()-0.5)*jit*0.3;
        }
        if(violenceActive){
          const pos=f.geometry.attributes.position;
          const spikeCount=Math.floor(Math.random()*8+3)*Math.ceil(esc);
          for(let s=0;s<spikeCount;s++){
            const vi=Math.floor(Math.random()*pos.count);
            const x=pos.getX(vi),y=pos.getY(vi),z=pos.getZ(vi);
            const len=Math.sqrt(x*x+y*y+z*z)||1;
            const mag=(0.5+Math.random()*2.0)*esc;
            pos.setXYZ(vi,x/len*(len+mag),y/len*(len+mag),z/len*(len+mag));
          }
          pos.needsUpdate=true;f.geometry.computeVertexNormals();
        } else if(Math.random()<spikeProbability()*f.geometry.attributes.position.count){
          const pos=f.geometry.attributes.position;
          const sc=Math.floor(Math.random()*3+1)*Math.ceil(esc*0.4);
          for(let s=0;s<sc;s++){
            const vi=Math.floor(Math.random()*pos.count);
            const x=pos.getX(vi),y=pos.getY(vi),z=pos.getZ(vi);
            const len=Math.sqrt(x*x+y*y+z*z)||1;
            const mag=(0.2+Math.random()*0.8)*esc;
            pos.setXYZ(vi,x/len*(len+mag),y/len*(len+mag),z/len*(len+mag));
          }
          pos.needsUpdate=true;f.geometry.computeVertexNormals();
        }
        if(Math.random()<0.01+density*0.01){
          const ng=buildGeo(ud.baseType||0,ud.segments||10,params.noiseFreq,params.noiseAmp,ud.sp||params.spikiness,params.hash+f.id,1);
          f.geometry.dispose();f.geometry=ng;
        }
      }
      if(f.material.uniforms){
        const flickerChance=0.02+density*0.04+wordBank.length*0.001;
        const flicker=Math.random()<flickerChance?0.1+Math.random()*0.4:1;
        f.material.uniforms.uEmitInt.value=(0.6+density*0.7)*flicker*Math.min(esc*0.5,3.0);
        f.material.uniforms.uTime.value=t*0.008*Math.min(esc*0.3,2.5);
        f.material.uniforms.uDread.value=violenceActive?0.5+Math.random()*0.5:Math.sin(t*0.002)*0.1;
        if(Math.random()<0.01) f.material.uniforms.uScanFreq.value=40+params.spikiness*80+wordBank.length+Math.random()*wordBank.length*1.5;
      }
    }
  }

  if(activeLights.length>0){
    const lt=t*0.004;
    activeLights[0].position.x=Math.sin(lt)*1.5*(destructionMode?2:1);
    activeLights[0].position.y=Math.cos(lt*0.5)*0.9*(destructionMode?2:1);
    activeLights[0].intensity=params.lightIntens*(1+density*0.8)*(destructionMode?2.5:1)*(0.85+Math.sin(t*0.02)*0.15);
    if(violenceActive)activeLights[0].intensity*=2.5;
    if(activeLights[1]){activeLights[1].position.x=Math.cos(lt*0.8)*1.2;activeLights[1].position.y=Math.sin(lt*0.5)*0.8;}
    if(activeLights[2]){
      const cp=0.7+laboredBreath((t*0.001)%1)*0.3;
      activeLights[2].intensity=params.lightIntens*0.8*(destructionMode?2:1)*cp*(1+density*0.2);
      activeLights[2].position.x=Math.sin(lt*1.2)*0.2;activeLights[2].position.y=Math.cos(lt*0.9)*0.15;
      if(violenceActive)activeLights[2].intensity*=3;
    }
    if(activeLights[3])activeLights[3].intensity=params.lightIntens*0.3*(destructionMode?1.5:1)*(0.7+Math.random()*0.3);
  }
  formGroup.rotation.y+=params.rotSpeed*(1+density*0.8)*(destructionMode?2:1)*0.5;
  formGroup.rotation.x+=params.rotSpeed*0.15*(destructionMode?1.5:1);
  if(destructionMode){destructionTimer--;if(destructionTimer<=0)endDestruction();}
}

// ============================================================
// DESTRUCTION
// ============================================================
function triggerDestruction(){
  destructionMode=true;destructionTimer=280;submissionsSinceDestruction=0;morphing=false;
  const wf=document.getElementById('whiteFlash');
  wf.style.opacity='0.6';setTimeout(()=>wf.style.opacity='0',150);
  rebuildForms(params,true);
}
function endDestruction(){
  destructionMode=false;destructionTimer=0;
  const wf=document.getElementById('whiteFlash');
  wf.style.opacity='0.4';setTimeout(()=>wf.style.opacity='0',120);
  rebuildForms(params,false);
}

// ============================================================
// LOOP
// ============================================================
function loop(){
  requestAnimationFrame(loop);
  frameT++;submitFlash=Math.max(0,submitFlash-1);
  animateForms();
  renderer.render(scene,camera);
  drawBloom();drawTears();
}

// ============================================================
// SUBMIT
// ============================================================
const RAND_WORDS=['void','static','break','lapse','decay','ghost','hollow','surge','bleed','crash','rift','pulse','scar','echo','drift','noise','tear','sink','raw','burn','wraith','collapse','signal','error','null','fracture','abject','rupture','flare','hollow'];
function addWord(word){
  wordBank.push(word);density=Math.min(1,density+0.018);
  const newParams=seedParams(word);
  newParams.shiftAmt=newParams.shiftAmt*(1+density*1.2);
  submissionsSinceDestruction++;submitFlash=20;
  if(!destructionMode){
    if(submissionsSinceDestruction>=DESTRUCTION_INTERVAL&&Math.random()<0.7){
      params=newParams;triggerDestruction();
    } else {
      startMorph(newParams);params=newParams;
      buildLights(params,false);
      const vc=params.voidColor;
      scene.fog.color.setRGB(vc[0]/255*0.3,vc[1]/255*0.3,vc[2]/255*0.3);
      renderer.setClearColor(new THREE.Color(vc[0]/6000,vc[1]/6000,vc[2]/6000),1);
    }
  } else {
    params=newParams;rebuildForms(params,true);
    destructionTimer=Math.max(destructionTimer,180);
  }
  persist();updateUI(word);
}
function updateUI(lastWord){
  document.getElementById('wordCount').textContent=wordBank.length;
  document.getElementById('densityPct').textContent=Math.round(density*100)+'%';
  if(lastWord){
    document.getElementById('latestWord').textContent='"'+lastWord+'"';
    const fb=document.getElementById('feedback');
    fb.textContent='"'+lastWord+'"';
    fb.classList.add('show');
    setTimeout(()=>fb.classList.remove('show'),1200);
  }
}
document.getElementById('submitBtn').addEventListener('click',()=>{
  const inp=document.getElementById('wordInput');
  const w=inp.value.trim().toLowerCase();
  if(!w)return;inp.value='';addWord(w);
});
document.getElementById('wordInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('submitBtn').click();});
document.getElementById('resetBtn').addEventListener('click',()=>{if(!confirm('reset?'))return;localStorage.removeItem('wb_ch01');localStorage.removeItem('dn_ch01');location.reload();});
document.getElementById('addTenBtn').addEventListener('click',()=>{for(let i=0;i<10;i++)addWord(RAND_WORDS[Math.floor(Math.random()*RAND_WORDS.length)]);});
document.getElementById('destroyBtn').addEventListener('click',triggerDestruction);
updateUI(null);loop();
</script>
